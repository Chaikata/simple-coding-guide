name: Generate Dev Duels

on:
  workflow_dispatch:
  schedule:
    # 2 times per day: 13:00 UTC and 21:00 UTC
    - cron: "0 13,21 * * *"

permissions:
  contents: write

jobs:
  generate-dev-duels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Dev Duels
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generateDevDuels.js

      - name: Import Dev Duels
        run: node scripts/importDevDuels.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/devDuels.ts generatedDevDuels.json
          git diff --cached --quiet || git commit -m "Automated Dev Duel generation"
          git push