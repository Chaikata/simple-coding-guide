name: Publish Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: publish-articles-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify OpenAI key exists
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY secret is missing"
            exit 1
          fi

      - name: Add OpenAI key
        run: echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env.local

      - name: Generate and import articles
        run: npm run publish:articles

      - name: Show changed files
        run: git status

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/articles.ts generatedArticles.json

          if git diff --cached --quiet; then
            echo "No new articles generated"
            exit 0
          fi

          git commit -m "Auto-generated articles"
          git push origin main