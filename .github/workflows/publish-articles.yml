name: Publish Articles

on:
  workflow_dispatch:
  schedule:
  - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Add OpenAI key
        run: echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env.local

      - name: Generate articles
        run: npm run publish:articles

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/articles.ts generatedArticles.json

          if git diff --cached --quiet; then
            echo "No new articles generated"
          else
            git commit -m "Auto-generated articles"
            git push
          fi